<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G Vs S</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main>
        <section id="home" class="">
            <header class="topbar">
                <a href="#home" class="brand">
                    <img src="./assets/icon.jpeg" alt="icon" class="brand-icon">
                    <span>GVS</span>
                </a>
                <nav class="topnav">
                    <a href="#home">HOME</a>
                    <a href="#about">ABOUT</a>
                    <a href="#game">GAME</a>
                    <a href="#react">REACTIONS</a>
                    <a href="#contact">CONTACT</a>
                    <a href="#ticket" class="ticket-btn">BUY TICKET</a>
                </nav>
            </header>
            <div class="hero">
                <div class="hero-text">
                    <h1> 
                        <span>Satoru Gojo</span> vs <span>Ryomen Sukuna</span> 
                    </h1>
                    <p class="lead"> 
                        The strongest sorcerer of today, 
                        versus the strongest sorcerer in history.
                        Who will win? 
                    </p>
                    <div class="hero-actions"> 
                        <a href="game" class="primary-action">Watch Match</a>
                        <a href="ticket" class="secondary-action">Get Ticket</a>
                    </div>
                </div>
            </div>
        </section>
        <div class="versus">
            <div class="player">
                <img src="./assets/maki.jpeg" alt="" class="circle-cut">
                <p>Maki Zen'in</p>
            </div>
            <p> vs </p>
            <div class="player">
                <img src="./assets/naoya.jpeg" alt="" class="circle-cut">
                <p>Naoya Zen'in</p>
            </div>
        </div>
    </main>
</body>


</html>
